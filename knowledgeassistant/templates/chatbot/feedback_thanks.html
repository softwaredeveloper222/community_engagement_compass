{% extends "chatbot/base.html" %}
{% load static %}

{% block title %}Thank You{% endblock %}

{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-8">
      <div class="card border-0 shadow-sm">
        <div class="card-body p-4 text-center">
          <div class="display-6 mb-3"></div>
          <h5 class="fw-bold mb-2">Thank you for sharing your insights and feedback!</h5>
          <p class="text-muted mb-0">You will be redirected to the chat in a moment...</p>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_js %}
{{ block.super }}
<script>
  document.addEventListener('DOMContentLoaded', function () {
    // Show any queued messages as toasts (handled globally in base)
    // Delay redirect to allow user to notice the toast
    setTimeout(function(){
      window.location.href = "{{ redirect_url|escapejs }}";
    }, 1000);
  });
</script>
{% endblock %}
